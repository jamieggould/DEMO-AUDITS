services:
  - type: web
    name: lawmens-audit-generator
    env: python
    plan: free
    buildCommand: >
      apt-get install -y --no-install-recommends
      libpango-1.0-0
      libpangocairo-1.0-0
      libcairo2
      libgdk-pixbuf2.0-0
      libffi-dev
      shared-mime-info &&
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
